services:
  - type: web
    name: payflow-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
        description: "MongoDB Connection String (e.g. mongodb+srv://...)"
